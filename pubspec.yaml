name: bestshot
description: "BestShot Flutter iOS App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── UI ──────────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17          # SVG 이미지 렌더링
  cached_network_image: ^3.4.1  # 네트워크 이미지 캐싱 + placeholder
  gap: ^3.0.1                   # SizedBox 대신 Gap(16) 형태로 간결하게
  lottie: ^3.3.1                # Lottie 애니메이션 (.json)
  flutter_animate: ^4.5.2       # 간결한 위젯 애니메이션 API
  shimmer: ^3.0.0               # 스켈레톤 로딩 효과

  # ── State management ────────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Navigation ──────────────────────────────────────────────────────────────
  go_router: ^14.8.1

  # ── Data / serialization ────────────────────────────────────────────────────
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # ── Networking ──────────────────────────────────────────────────────────────
  dio: ^5.8.0+1

  # ── Storage ─────────────────────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  photo_manager: ^3.7.1
  path_provider: ^2.1.5
  image_picker: ^1.1.2

  # ── Utilities ───────────────────────────────────────────────────────────────
  logger: ^2.5.0
  intl: ^0.20.2
  share_plus: ^10.1.2
  home_widget: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Linting ─────────────────────────────────────────────────────────────────
  flutter_lints: ^6.0.0
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

  # ── Code generation ─────────────────────────────────────────────────────────
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.4
  freezed: ^3.0.0
  json_serializable: ^6.9.4

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  # fonts:
  #   - family: YourFont
  #     fonts:
  #       - asset: assets/fonts/YourFont-Regular.ttf
